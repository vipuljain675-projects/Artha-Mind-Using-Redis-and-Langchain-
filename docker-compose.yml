version: "3.9"

services:
  redis:
    image: redis/redis-stack:latest
    container_name: arthamind-redis
    ports:
      - "6379:6379"   # Redis database port
      - "8001:8001"   # RedisInsight UI
    volumes:
      - redis_data:/data   # Persist data across restarts
    restart: unless-stopped

volumes:
  redis_data:
